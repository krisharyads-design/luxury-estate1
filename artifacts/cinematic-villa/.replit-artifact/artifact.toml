kind = "web"
previewPath = "/"
title = "Cinematic Villa Experience"
version = "1.0.0"
id = "artifacts/cinematic-villa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21693

[services.development]
run = "pnpm --filter @workspace/cinematic-villa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cinematic-villa", "run", "build" ]
publicDir = "artifacts/cinematic-villa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21693"
BASE_PATH = "/"
